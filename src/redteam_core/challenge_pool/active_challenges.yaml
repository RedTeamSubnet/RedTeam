ab_sniffer_v6:
  name: "ab_sniffer_v6"
  description: "Detect automation frameworks"
  challenge_incentive_weight: 0.5
  challenge_image: "redteamsubnet61/rest-abs-challenge:6.0.2"
  target: abs_challenge.controller.ABSController
  challenge_manager: abs_challenge.challenge_manager.ABSChallengeManager
  script_path_identifier: "commit_files"
  challenge_type: "abs"
  challenge_solve_timeout: 60
  docker_run_timeout: 900
  num_tasks: 1
  scoring_headers:
    X-API-KEY: "${RT_CHALLENGE_API_KEY}"
  comparison_config:
    max_unique_commits: 15
    max_self_comparison_score: 0.8
    min_acceptable_score: 0.6
  challenge_container_run_kwargs:
    name: "ab_sniffer_v6"
    platform: "linux/amd64"
    ulimits:
      - Name: "nofile"
        Soft: 65536
        Hard: 65536
    privileged: true
    environment:
      ENV: "PRODUCTION"
      ABS_CHALLENGE_API_KEY: "${RT_CHALLENGE_API_KEY}"
      ABS_CHALLENGE_VERIFICATION_API_KEY: "${ABS_CHALLENGE_VERIFICATION_API_KEY}"
      ABS_CHALLENGE_VERIFICATION_ENDPOINT: "${ABS_CHALLENGE_VERIFICATION_ENDPOINT}"
      ABS_CHALLENGE_VERIFICATION_STARTUP_URL: "${ABS_CHALLENGE_VERIFICATION_STARTUP_URL}"
      ABS_CHALLENGE_BOT_RUNNER_SERVERS: "${ABS_CHALLENGE_BOT_RUNNER_SERVERS}"
      ABS_CHALLENGE_BOT_RUNNER_API_KEY: "${ABS_CHALLENGE_BOT_RUNNER_API_KEY}"
      ABS_CHALLENGE_BOT_RUNNER_PUBLIC_BASE_URL: "${ABS_CHALLENGE_BOT_RUNNER_PUBLIC_BASE_URL}"
      ABS_CHALLENGE_BOT_RUNNER_BOT: "${ABS_CHALLENGE_BOT_RUNNER_BOT}"
      ABS_API_LOGS_DIR: "/var/log/rest-abs-challenge"
    volumes:
      - "${RT_CHALLENGE_LOGS_DIR}:/var/log/rest-abs-challenge"
  miner_container_run_kwargs:
    cpu_count: 4
    mem_limit: "12g"
    network: "redteam_local"
    environment:
      CHALLENGE_NAME: "ab_sniffer_v6"
  protocols:
    challenger: "http"
    challenger_ssl_verify: false
    miner: "http"
    miner_ssl_verify: false
  resource_limits:
    num_cpus: 4
    mem_limit: "12g"

flowradar_v2:
  name: "flowradar_v2"
  description: "Detect VPN using Network Flow data"
  challenge_incentive_weight: 0.2
  challenge_image: "redteamsubnet61/flowradar-challenge:2.0.2"
  target: flr_challenge.controller.FLRController
  challenge_manager: flr_challenge.challenge_manager.FLRChallengeManager
